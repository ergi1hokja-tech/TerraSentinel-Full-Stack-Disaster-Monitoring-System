{% extends "base.html" %}

{% block content %}
<style>
.login-box {
    max-width: 350px;
    margin: 70px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}
.login-box h2 {
    text-align: center;
    color: #004466;
}
.login-box input {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
}
.login-btn {
    width: 100%;
    margin-top: 18px;
    padding: 10px;
    background: #004466;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
.login-btn:hover {
    background: #1589A5;
}
</style>
<div class="login-box login-card">
    <h2>Sign In</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button class="login-btn">Login</button>
    </form>
    <p style="text-align:center; margin-top:10px;">
        <a href="/forgot-password">Forgot Password?</a>
    </p>
</div>

{% endblock %}
