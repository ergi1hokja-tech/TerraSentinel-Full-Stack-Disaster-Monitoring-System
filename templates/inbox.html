{% extends 'base.html' %}

{% block content %}
<div class="container" style="margin-top: 30px;">
    <h2 style="color: red;"><b><i>📬 Digest Inbox</i></b></h2>
<div style="color: white;">
    {% if digests %}
        {% for msg in digests %}
            <div class="card" style="margin-bottom: 20px;">
                <div class="card-body">
                    <h5 class="card-title" style="color: red;">🕒 {{ msg.sent_at.strftime('%Y-%m-%d %H:%M') }}</h5>
                    <p class="card-text" style="white-space: pre-line;">{{ msg.content }}</p>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <p>No digest messages yet.</p>
    {% endif %}
    </div>
</div>
{% endblock %}
